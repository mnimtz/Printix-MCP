name: Build macOS Client (DMG)

on:
  push:
    tags:
      - 'macos-client-v*'
    paths:
      - 'macos-client/**'
      - '.github/workflows/build-macos-client.yml'
  pull_request:
    paths:
      - 'macos-client/**'
  workflow_dispatch:

defaults:
  run:
    shell: bash
    working-directory: macos-client

jobs:
  build:
    runs-on: macos-14   # Apple Silicon runner — baut Universal-Binary für arm64+x86_64
    permissions:
      contents: write   # für softprops/action-gh-release
    env:
      DEVELOPER_DIR: /Applications/Xcode_15.4.app/Contents/Developer

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SPM ruft intern `git describe` auf; mit shallow-Clone schlägt das fehl (exit 128)

      - name: Configure git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Show Xcode / Swift version
        run: |
          xcodebuild -version
          swift --version
          xcrun --sdk macosx --show-sdk-path

      - name: Derive version from tag
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/macos-client-v* ]]; then
              VERSION="${GITHUB_REF#refs/tags/macos-client-v}"
          else
              VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build arm64
        run: swift build --arch arm64 -c release

      - name: Build x86_64
        run: swift build --arch x86_64 -c release

      - name: Make universal binaries
        run: |
          set -x
          OUT=".build/apple/Products/Release"
          mkdir -p "$OUT"
          for bin in PrintixSendApp printix-send-cli; do
              lipo -create \
                   ".build/arm64-apple-macosx/release/$bin" \
                   ".build/x86_64-apple-macosx/release/$bin" \
                   -output "$OUT/$bin"
          done
          lipo -info "$OUT/PrintixSendApp" "$OUT/printix-send-cli"

      - name: Make .app bundle
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: bash scripts/make-app-bundle.sh

      - name: Make DMG
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: bash scripts/make-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintixSend-macOS-${{ steps.ver.outputs.version }}
          path: macos-client/dist/PrintixSend-*.dmg
          if-no-files-found: error

      - name: Upload .app bundle (for notarization/debug)
        uses: actions/upload-artifact@v4
        with:
          name: PrintixSend-app-bundle-${{ steps.ver.outputs.version }}
          path: macos-client/dist/PrintixSend.app
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/macos-client-v')
        uses: softprops/action-gh-release@v2
        with:
          name: Printix Send macOS ${{ github.ref_name }}
          body: |
            # Printix Send für macOS

            Menu-Bar-App + Finder-Quick-Actions — macOS-Pendant zum Windows-Client.

            ## Installation
            1. `PrintixSend-*.dmg` herunterladen und öffnen
            2. `PrintixSend.app` in den **Applications**-Ordner ziehen
            3. Beim ersten Start Rechtsklick → **Öffnen** (Gatekeeper, da unsigniert)
            4. Menu-Bar-Icon 🖨 → **Konfiguration…** → Server-URL eintragen
            5. **Anmelden…** → Benutzer/Passwort oder **Mit Microsoft (Entra)**
            6. Rechtsklick auf eine Datei → **Quick Actions** → `Printix Send — <Ziel>`

            ## Systemanforderungen
            - macOS 13 Ventura oder neuer
            - Apple Silicon **oder** Intel (Universal-Binary)
          files: |
            macos-client/dist/PrintixSend-*.dmg
          draft: false
          prerelease: false
