{% extends "base.html" %}
{% set show_nav = false %}
{% block title %}Anmelden — Printix MCP{% endblock %}
{% block content %}
<div style="display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px;">
  <div style="width:100%; max-width:380px;">
    <div style="text-align:center; margin-bottom:28px;">
      <div style="font-size:2.5em; margin-bottom:8px;">🖨️</div>
      <h1 style="font-size:1.3em; color:#1e3a5f;">Printix MCP Admin</h1>
      <p style="color:#6b7280; font-size:.9em; margin-top:4px;">Bitte anmelden</p>
    </div>
    <div class="card">
      {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <div class="form-group">
          <label for="username">Benutzername</label>
          <input type="text" id="username" name="username" value="{{ username | default('') }}"
                 autocomplete="username" autofocus required>
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Anmelden</button>
      </form>
      <div style="margin-top:20px; text-align:center; font-size:.85em; color:#6b7280;">
        Noch kein Konto? <a href="/register" style="color:#2563eb;">Registrieren</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
