{% extends "base.html" %}
{% block title %}Genehmigung ausstehend{% endblock %}
{% block content %}
<div class="container" style="max-width:500px;">
  <div class="card" style="text-align:center; padding:48px 36px;">
    <div style="font-size:3em; margin-bottom:16px;">⏳</div>
    <h1 style="font-size:1.4em; color:#1e3a5f; margin-bottom:12px;">Genehmigung ausstehend</h1>
    <p style="color:#6b7280; line-height:1.7; margin-bottom:24px;">
      Dein Account <strong>{{ user.username if user else '' }}</strong> wurde erstellt und
      wartet auf Freischaltung durch einen Administrator.
    </p>
    <a href="/logout" class="btn btn-secondary">Abmelden</a>
  </div>
</div>
{% endblock %}
